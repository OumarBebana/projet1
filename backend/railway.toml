[build]
builder = "nixpacks"
buildCommand = "python -m ensurepip --upgrade && python -m pip install -r requirements.txt"

[deploy]
startCommand = "python manage.py migrate --noinput && python manage.py seed_sources && python manage.py collectstatic --noinput && gunicorn govnews.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
