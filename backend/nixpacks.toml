[phases.setup]
nixPkgs = ["python313", "python313Packages.pip", "gcc"]

[phases.install]
cmds = ["python3 -m pip install -r requirements.txt"]

[start]
cmd = "python3 manage.py migrate --noinput && python3 manage.py collectstatic --noinput && gunicorn govnews.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
